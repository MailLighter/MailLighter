<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>HTML Viewer</title>

  <!-- Office JavaScript API -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; font-size: 13px; padding: 10px; background: #fafafa; }
    h2 { font-size: 14px; margin-bottom: 8px; color: #333; }
    .toolbar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    button {
      padding: 6px 12px; font-size: 12px; border: 1px solid #ccc;
      border-radius: 4px; background: #fff; cursor: pointer;
    }
    button:hover { background: #e8e8e8; }
    button.primary { background: #0078d4; color: #fff; border-color: #0078d4; }
    button.primary:hover { background: #106ebe; }
    #status { font-size: 11px; color: #666; margin-bottom: 8px; }
    #htmlOutput {
      width: 100%; min-height: 200px; max-height: 45vh;
      font-family: Consolas, "Courier New", monospace; font-size: 11px;
      border: 1px solid #ccc; border-radius: 4px; padding: 8px;
      overflow: auto; white-space: pre-wrap; word-break: break-all;
      background: #fff; tab-size: 2;
    }
    #separators {
      margin-top: 12px; padding: 8px; border: 1px solid #d0d0d0;
      border-radius: 4px; background: #fff; max-height: 35vh; overflow: auto;
    }
    .log-panel {
      margin-top: 12px; padding: 8px; border: 1px solid #d0d0d0;
      border-radius: 4px; background: #fff; max-height: 35vh; overflow: auto;
    }
    .log-panel h3 { font-size: 13px; margin-bottom: 6px; color: #0078d4; }
    #dialogLog {
      font-family: Consolas, monospace; font-size: 11px;
      white-space: pre-wrap; word-break: break-all;
      max-height: 30vh; overflow: auto; margin: 0;
    }
    #separators h3 { font-size: 13px; margin-bottom: 6px; color: #0078d4; }
    .sep-item {
      margin-bottom: 8px; padding: 6px; background: #f4f4f4;
      border-radius: 3px; font-family: Consolas, monospace; font-size: 11px;
      white-space: pre-wrap; word-break: break-all;
    }
    .sep-item .label { font-weight: bold; color: #d83b01; margin-bottom: 2px; }
    .sep-none { color: #888; font-style: italic; }
  </style>
</head>

<body>
  <h2>HTML Viewer (dev)</h2>
  <div class="toolbar">
    <button id="btnRefresh" class="primary">Refresh</button>
    <button id="btnCopy">Copy HTML</button>
    <button id="btnCopySep">Copy Separators</button>
    <button id="btnOpenSettings">Test open Settings</button>
    <button id="btnClearLog">Clear log</button>
  </div>
  <div id="status">Click Refresh to load the email HTML.</div>
  <pre id="htmlOutput"></pre>
  <div id="separators">
    <h3>Detected separators</h3>
    <div id="sepList"><span class="sep-none">No data yet.</span></div>
  </div>
  <div class="log-panel">
    <h3>Settings dialog log</h3>
    <pre id="dialogLog">No dialog activity yet.</pre>
  </div>
</body>

</html>
