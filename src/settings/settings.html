<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Office JavaScript API -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      color: #323130;
      background: #ffffff;
      padding: 24px;
      line-height: 1.5;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #0078d4;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #edebe9;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 img,
    .savings-section h2 img,
    .savings-row-icon img {
      width: 20px;
      height: 20px;
      vertical-align: middle;
    }

    .savings-section h2 {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .savings-row-icon img {
      width: 18px;
      height: 18px;
    }

    .setting-item {
      margin-bottom: 20px;
    }

    .setting-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .setting-label input[type="checkbox"] {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #0078d4;
    }

    .setting-text {
      flex: 1;
    }

    .setting-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .setting-description {
      color: #605e5c;
      font-size: 12px;
      line-height: 1.5;
    }

    .eco-preview {
      display: none;
      margin-top: 10px;
      margin-left: 26px;
      padding: 10px 14px;
      background: #f1f8f1;
      border-left: 3px solid #2e7d32;
      border-radius: 0 4px 4px 0;
      font-size: 12px;
      color: #2e7d32;
      line-height: 1.5;
    }

    .eco-preview.visible {
      display: block;
    }

    .eco-preview a {
      color: #1b5e20;
      text-decoration: none;
    }

    .eco-preview a:hover {
      text-decoration: underline;
    }

    .preview-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a19f9d;
      margin-bottom: 6px;
    }

    .eco-edit-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a19f9d;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .eco-textarea-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .eco-textarea {
      flex: 1;
      min-height: 72px;
      font-family: inherit;
      font-size: 12px;
      padding: 8px;
      border: 1px solid #c8c6c4;
      border-radius: 4px;
      resize: vertical;
      color: #323130;
      line-height: 1.5;
    }

    .eco-textarea:focus {
      outline: none;
      border-color: #0078d4;
    }

    .reset-btn {
      padding: 6px 10px;
      background: #f3f2f1;
      color: #323130;
      border: 1px solid #c8c6c4;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }

    .reset-btn:hover {
      background: #edebe9;
    }

    .eco-preview-rendered {
      font-size: 12px;
      color: #2e7d32;
      line-height: 1.5;
    }

    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #edebe9;
      display: flex;
      justify-content: flex-end;
    }

    button {
      padding: 8px 20px;
      background: #0078d4;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.1s;
    }

    button:hover {
      background: #106ebe;
    }

    button:active {
      background: #005a9e;
    }

    .savings-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #edebe9;
    }

    .savings-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #323130;
      margin-bottom: 14px;
    }

    .savings-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .savings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #605e5c;
    }

    .savings-row-icon {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .savings-row-label {
      flex: 1;
    }

    .savings-row-value {
      font-weight: 600;
      color: #323130;
      min-width: 70px;
      text-align: right;
    }

    .savings-total-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f1f8f1;
      border: 1px solid #c8e6c9;
      border-radius: 6px;
      margin-top: 4px;
    }

    .savings-total-label {
      font-weight: 600;
      color: #2e7d32;
      font-size: 13px;
    }

    .savings-total-value {
      font-weight: 700;
      color: #2e7d32;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <h1><img src="/assets/icon-settings-32.png" alt="" /><span id="settingsTitle">Paramètres de MailLighter</span></h1>

  <div class="setting-item">
    <label class="setting-label">
      <input type="checkbox" id="ecoMessageCheckbox" />
      <div class="setting-text">
        <div class="setting-title" id="ecoMessageTitle">Message écologique</div>
        <div class="setting-description" id="ecoMessageDescription">
          Ajoute automatiquement un message à la fin de l'email quand l'historique des réponses est supprimé.
        </div>
      </div>
    </label>

    <div class="eco-preview" id="ecoPreview">
      <div class="eco-edit-label" id="ecoMessageEditLabel">Personnaliser le message</div>
      <div class="eco-textarea-row">
        <textarea class="eco-textarea" id="ecoMessageTextarea"></textarea>
        <button class="reset-btn" id="ecoResetButton">Réinitialiser</button>
      </div>
      <div class="preview-label" id="previewLabel">Aperçu du message</div>
      <div class="eco-preview-rendered" id="ecoPreviewText"></div>
    </div>
  </div>

  <div class="savings-section">
    <h2 id="savingsTitle">Mes économies</h2>
    <div class="savings-rows">
      <div class="savings-row">
        <span class="savings-row-icon"><img src="/assets/icon-remove-images-32.png" alt="" /></span>
        <span class="savings-row-label" id="savingsImagesLabel">Images</span>
        <span class="savings-row-value" id="savingsImages">—</span>
      </div>
      <div class="savings-row">
        <span class="savings-row-icon"><img src="/assets/icon-keep-replies-32.png" alt="" /></span>
        <span class="savings-row-label" id="savingsRepliesLabel">Réponses</span>
        <span class="savings-row-value" id="savingsReplies">—</span>
      </div>
      <div class="savings-row">
        <span class="savings-row-icon"><img src="/assets/icon-remove-attachments-32.png" alt="" /></span>
        <span class="savings-row-label" id="savingsAttachmentsLabel">Pièces jointes</span>
        <span class="savings-row-value" id="savingsAttachments">—</span>
      </div>
    </div>
    <div class="savings-total-box">
      <span class="savings-total-label" id="savingsTotalLabel">Total économisé</span>
      <span class="savings-total-value" id="savingsTotal">0</span>
    </div>
  </div>

  <div class="footer">
    <button id="closeButton">Fermer</button>
  </div>
</body>

</html>
